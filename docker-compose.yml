# Optional: local development parity via Docker Compose.
# This is NOT used for EC2 production deploy — Caddy runs host-level there.
# Use this only if you want containerised local dev without installing Go/Node.
#
# Usage:
#   docker compose up --build
#
# Caddy is intentionally excluded — on EC2 it runs as a systemd service.

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    volumes:
      # Persist SQLite DB across container restarts
      - claudemote-db:/var/lib/claudemote
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      - BACKEND_URL=http://api:8080
    depends_on:
      - api
    restart: unless-stopped

volumes:
  claudemote-db:
